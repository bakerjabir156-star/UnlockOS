name: Build UnlockOS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_distro:
        description: 'Base Ubuntu version'
        required: true
        default: 'noble'
        type: choice
        options: [noble, jammy]

jobs:
  build-iso:
    name: Build UnlockOS Bootable ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # ─────────────────────────────────────────────────────────────
    # 1. Checkout
    # ─────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    # ─────────────────────────────────────────────────────────────
    # 2. Install ISO build tools
    # ─────────────────────────────────────────────────────────────
    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          debootstrap squashfs-tools xorriso \
          grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed \
          grub-common mtools dosfstools \
          shim-signed \
          build-essential git cmake pkg-config \
          libssl-dev libusb-1.0-0-dev \
          python3-pip python3-venv \
          curl wget ca-certificates

    # ─────────────────────────────────────────────────────────────
    # 3. Create base Ubuntu chroot via debootstrap
    # ─────────────────────────────────────────────────────────────
    - name: Create base Ubuntu 24.04 chroot
      run: |
        DISTRO="${{ github.event.inputs.base_distro || 'noble' }}"
        echo "Building with base: $DISTRO"

        # IMPORTANT: chroot cree dans /mnt/chroot (HORS du workspace)
        # pour eviter que cp -r copie recursivement le chroot lui-meme
        sudo mkdir -p /mnt/chroot
        sudo debootstrap \
          --arch=amd64 \
          --include=ca-certificates,curl,wget,gnupg,lsb-release \
          "$DISTRO" \
          /mnt/chroot \
          http://archive.ubuntu.com/ubuntu/

        echo "Debootstrap complete: $(du -sh /mnt/chroot | cut -f1)"

    # ─────────────────────────────────────────────────────────────
    # 4. Configure chroot (sources.list + DNS)
    # ─────────────────────────────────────────────────────────────
    - name: Configure chroot environment
      run: |
        DISTRO="${{ github.event.inputs.base_distro || 'noble' }}"

        # DNS resolution inside chroot
        sudo cp /etc/resolv.conf /mnt/chroot/etc/resolv.conf

        # APT sources
        sudo bash -c "cat > /mnt/chroot/etc/apt/sources.list << EOF
        deb http://archive.ubuntu.com/ubuntu $DISTRO main restricted universe multiverse
        deb http://archive.ubuntu.com/ubuntu ${DISTRO}-updates main restricted universe multiverse
        deb http://security.ubuntu.com/ubuntu ${DISTRO}-security main restricted universe multiverse
        EOF"
        sudo sed -i 's/^[ \t]*//' /mnt/chroot/etc/apt/sources.list

        # Mount virtual filesystems
        sudo mount --bind /dev  /mnt/chroot/dev
        sudo mount --bind /run  /mnt/chroot/run
        sudo mount -t proc  proc    /mnt/chroot/proc
        sudo mount -t sysfs sysfs   /mnt/chroot/sys
        sudo mount -t devpts devpts /mnt/chroot/dev/pts

    # ─────────────────────────────────────────────────────────────
    # 5. Copy project sources into chroot
    # ─────────────────────────────────────────────────────────────
    - name: Copy UnlockOS sources into chroot
      run: |
        sudo mkdir -p /mnt/chroot/opt/unlockos/dashboard
        sudo mkdir -p /mnt/chroot/tmp/unlockos-dashboard

        # Copie SANS le dossier chroot lui-meme (evite la recursion)
        # rsync exclut .git et tout repertoire temporaire
        sudo rsync -a \
          --exclude='.git' \
          --exclude='chroot/' \
          --exclude='iso_staging/' \
          --exclude='*.iso' \
          --exclude='*.db' \
          --exclude='__pycache__/' \
          ./ /mnt/chroot/tmp/unlockos-dashboard/

        echo "Sources copiees: $(ls /mnt/chroot/tmp/unlockos-dashboard/)"

    # ─────────────────────────────────────────────────────────────
    # 6. Run CI build script inside chroot
    # ─────────────────────────────────────────────────────────────
    - name: Run UnlockOS CI build inside chroot
      run: |
        sudo cp build_ci.sh /mnt/chroot/tmp/build_ci.sh
        sudo chmod +x /mnt/chroot/tmp/build_ci.sh
        sudo chroot /mnt/chroot /bin/bash /tmp/build_ci.sh 2>&1 | tee build.log || true
        echo "Chroot build complete"

    # ─────────────────────────────────────────────────────────────
    # 7. Install kernel + initrd inside chroot
    # ─────────────────────────────────────────────────────────────
    - name: Install kernel and live-boot in chroot
      run: |
        sudo chroot /mnt/chroot /bin/bash -c "
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            linux-image-generic \
            live-boot \
            live-boot-initramfs-tools \
            live-config \
            live-config-systemd \
            discover \
            laptop-detect \
            os-prober \
            network-manager \
            net-tools \
            locales \
            grub2 \
            grub-pc
        "

    - name: Configure live-boot user and overlay
      run: |
        # ── Modules overlay + squashfs dans l'initramfs ───────────────────
        echo "overlay"  | sudo tee -a /mnt/chroot/etc/initramfs-tools/modules
        echo "squashfs" | sudo tee -a /mnt/chroot/etc/initramfs-tools/modules

        # ── Creer /etc/live/config.conf pour live-config ──────────────────
        sudo mkdir -p /mnt/chroot/etc/live
        sudo tee /mnt/chroot/etc/live/config.conf > /dev/null << 'EOF'
LIVE_CONFIG_COMPONENTS="hostname,user-setup,sudo,locales,timezone,keyboard-layouts,sysv-rc,x11-common,xorg,gdm3,login,getty,keyboard-layouts"
LIVE_HOSTNAME="unlockos"
LIVE_USERNAME="unlockos"
LIVE_USER_FULLNAME="UnlockOS User"
LIVE_USER_DEFAULT_GROUPS="audio,cdrom,dialout,floppy,video,plugdev,netdev,sudo"
EOF

        # ── Creer l'utilisateur unlockos dans le chroot ───────────────────
        sudo chroot /mnt/chroot useradd \
          -m -s /bin/bash \
          -G sudo,adm,audio,video,plugdev,netdev \
          -c "UnlockOS User" unlockos 2>/dev/null || true
        echo "unlockos:unlockos" | sudo chroot /mnt/chroot chpasswd
        echo "unlockos ALL=(ALL) NOPASSWD:ALL" \
          | sudo tee /mnt/chroot/etc/sudoers.d/unlockos > /dev/null
        sudo chmod 440 /mnt/chroot/etc/sudoers.d/unlockos

        # ── Regenerer l'initramfs avec overlay inclus ─────────────────────
        sudo chroot /mnt/chroot update-initramfs -u -k all
        echo "live-boot + overlay configured"

    # ─────────────────────────────────────────────────────────────
    # 8. Unmount virtual filesystems
    # ─────────────────────────────────────────────────────────────
    - name: Unmount chroot filesystems
      if: always()
      run: |
        sudo umount -lf /mnt/chroot/dev/pts 2>/dev/null || true
        sudo umount -lf /mnt/chroot/dev     2>/dev/null || true
        sudo umount -lf /mnt/chroot/run     2>/dev/null || true
        sudo umount -lf /mnt/chroot/proc    2>/dev/null || true
        sudo umount -lf /mnt/chroot/sys     2>/dev/null || true
        echo "Unmount complete"

    # ─────────────────────────────────────────────────────────────
    # 9. Build ISO filesystem structure
    # ─────────────────────────────────────────────────────────────
    - name: Assemble ISO structure
      run: |
        # make_iso.sh utilise /mnt/chroot (variable CHROOT_DIR)
        sudo CHROOT_DIR=/mnt/chroot bash make_iso.sh 2>&1 | tee iso_build.log

    # ─────────────────────────────────────────────────────────────
    # 10. Get ISO size and checksum
    # ─────────────────────────────────────────────────────────────
    - name: Generate ISO checksum
      run: |
        ls -lh UnlockOS-*.iso 2>/dev/null || ls -lh *.iso
        sha256sum UnlockOS-*.iso 2>/dev/null | tee UnlockOS-SHA256.txt || true
        md5sum    UnlockOS-*.iso 2>/dev/null | tee UnlockOS-MD5.txt    || true

    # ─────────────────────────────────────────────────────────────
    # 11. Upload ISO as GitHub Actions Artifact (downloadable)
    # ─────────────────────────────────────────────────────────────
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnlockOS-ISO-${{ github.run_number }}
        path: |
          unlockOS10.iso
          UnlockOS-*.iso
          UnlockOS-SHA256.txt
          UnlockOS-MD5.txt
          build.log
        retention-days: 30
        compression-level: 0

    # ─────────────────────────────────────────────────────────────
    # 12. Create GitHub Release (si tag poussé)
    # ─────────────────────────────────────────────────────────────
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          UnlockOS-*.iso
          UnlockOS-SHA256.txt
        generate_release_notes: true
        body: |
          ## UnlockOS ${{ github.ref_name }}

          ISO bootable generee automatiquement par GitHub Actions.

          ### Flash la cle USB
          - **Windows** : Rufus (rufus.ie) ou Balena Etcher
          - **Linux/Mac** : `sudo dd if=UnlockOS-*.iso of=/dev/sdX bs=4M status=progress`

          ### Verifier l'integrite
          Comparez le SHA256 avec le fichier `UnlockOS-SHA256.txt`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
